<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="#f0f0f0" />
  
  <!-- Subtle pattern for background texture -->
  <pattern id="diagonalPattern" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="10" stroke="#e8e8e8" stroke-width="2" />
  </pattern>
  <circle cx="200" cy="200" r="195" fill="url(#diagonalPattern)" stroke="#e0e0e0" stroke-width="2" />
  
  <!-- Person silhouette - head -->
  <circle cx="200" cy="150" r="70" fill="#dddddd" />
  
  <!-- Person silhouette - shoulders/body -->
  <path d="M 120 280 
           C 120 240, 160 220, 200 220 
           C 240 220, 280 240, 280 280
           L 280 350 
           C 280 370, 240 390, 200 390
           C 160 390, 120 370, 120 350
           Z" 
        fill="#dddddd" />
        
  <!-- Optional inner border -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="5,5" />
  
  <!-- Camera icon on the silhouette -->
  <g transform="translate(173, 130) scale(0.9)">
    <rect x="0" y="0" width="60" height="45" rx="5" ry="5" fill="#c0c0c0" />
    <circle cx="30" cy="20" r="12" fill="#a0a0a0" />
    <circle cx="30" cy="20" r="6" fill="#808080" />
    <rect x="45" y="5" width="10" height="5" rx="2" ry="2" fill="#a0a0a0" />
  </g>
</svg>